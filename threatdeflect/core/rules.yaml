    - .c
    - .cpp
    - .h
    - .hpp
    - .cs
    - .swift
    - .scala
    - .groovy
    - .r
    - .lua
    - .pl
    - .ex
    - .exs
    - .erl
    - .dart
    - .zig

    # Shell / scripts
    - .sh
    - .bash
    - .zsh
    - .ps1
    - .psm1
