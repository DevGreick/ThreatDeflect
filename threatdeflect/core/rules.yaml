# --- MAPA DE SEVERIDADE ---
severity_map:
  # CRITICAL: Vazamento direto de credenciais com formato validavel
  Private Key: CRITICAL
  AWS Key: CRITICAL
  AWS Secret Key: CRITICAL
  GitHub Token: CRITICAL
  GitLab PAT: CRITICAL
  Slack Token: CRITICAL
  Stripe API Key: CRITICAL
  Stripe Secret Key: CRITICAL
  Google Cloud API Key: CRITICAL
  Firebase Server Key: CRITICAL
  Azure Storage Key: CRITICAL
  DigitalOcean Token: CRITICAL
  Telegram Bot Token: CRITICAL
  Discord Bot Token: CRITICAL
  NPM Auth Token: CRITICAL
  PyPI Token: CRITICAL
  Malicious Dependency: CRITICAL
  Database Connection String: CRITICAL
  Supabase Service Key: CRITICAL
  Discord Webhook: CRITICAL
  Slack Incoming Webhook: CRITICAL
  Crypto Mining: CRITICAL
  JNDI Injection: CRITICAL
  GCP Service Account Key: CRITICAL

  # HIGH: Credenciais provaveis ou execucao remota
  Heroku API Key: HIGH
  Twilio Auth Token: HIGH
  SendGrid API Key: HIGH
  Mailgun API Key: HIGH
  Datadog API Key: HIGH
  Remote Script Execution: HIGH
  Hidden IOC (Base64): HIGH
  PowerShell Encoded: HIGH
  NPM Dangerous Hook: HIGH
  Cloud Metadata SSRF: HIGH
  Encoded Payload Execution: HIGH
  Docker Socket Mount: HIGH
  SSH Key Injection: HIGH
  Sensitive File Access: HIGH
  Validated Generic API Key: HIGH
  Remote Code Loading: HIGH
  Paste Service C2: HIGH
  Validated Suspicious Command: MEDIUM
  Crontab Injection: MEDIUM
  Tunnel Service URL: MEDIUM
  Unsafe Deserialization: MEDIUM

  # MEDIUM: Requer contexto para confirmar
  Password in URL: MEDIUM
  Twilio SID: MEDIUM
  JSON Web Token (JWT): MEDIUM
  Google OAuth Client ID: MEDIUM
  Suspicious JS Keyword: MEDIUM
  High Entropy String: MEDIUM

  # LOW: Indicadores fracos, dependem de validacao por IA
  Sensitive File: LOW
  Generic API Key: LOW
  Suspicious Command: LOW
  Invisible Whitespace: LOW

# --- REGRAS DE DETECCAO ---
# Cada regra tem um id (referenciado no severity_map) e um pattern (regex).
# O motor Rust separa regras por tipo:
#   - IDs com "command" ou "execution" → so disparam fora de contextos seguros
#   - Demais → tratados como deteccao de segredos/credenciais
rules:
  # ── Chaves privadas ──
  - id: Private Key
    pattern: "-----BEGIN ((EC|RSA|OPENSSH|DSA|PGP) )?PRIVATE KEY(----- |-{5})"

  # ── AWS ──
  # AKIA/ASIA prefixos sao unicos da AWS, word boundary previne substrings
  - id: AWS Key
    pattern: '\b(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}\b'
  - id: AWS Secret Key
    pattern: '(?i)(aws_secret_access_key|aws_secret_key)\s*[:=]\s*["'']?[A-Za-z0-9/+=]{40}["'']?'

  # ── GitHub / GitLab ──
  # Prefixos ghp_/glpat- sao unicos, \b suficiente
  - id: GitHub Token
    pattern: '\b(ghp|gho|ghu|ghs|ghr)_[0-9a-zA-Z]{36}\b'
  - id: GitLab PAT
    pattern: '\bglpat-[0-9a-zA-Z\-_]{20}\b'

  # ── Messaging / Chat ──
  - id: Slack Token
    pattern: '\bxox[baprs]-[0-9a-zA-Z\-]{10,48}\b'
  - id: Telegram Bot Token
    pattern: '\b[0-9]{8,10}:[A-Za-z0-9_-]{35}\b'
  - id: Discord Bot Token
    pattern: '\b[MN][A-Za-z0-9]{23,}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27,}\b'

  # ── Payment ──
  - id: Stripe API Key
    pattern: '\bsk_live_[0-9a-zA-Z]{24,}\b'
  - id: Stripe Secret Key
    pattern: '\brk_live_[0-9a-zA-Z]{24,}\b'

  # ── Cloud providers ──
  - id: Google Cloud API Key
    pattern: '\bAIza[0-9A-Za-z\-_]{35}\b'
  - id: Google OAuth Client ID
    pattern: '[0-9]{6,}-[0-9a-zA-Z_]{32}\.apps\.googleusercontent\.com'
  - id: Firebase Server Key
    pattern: '\bAAAA[A-Za-z0-9_-]{7}:[A-Za-z0-9_-]{140,}\b'
  - id: Azure Storage Key
    pattern: '(?i)(AccountKey|azure[_-]?storage[_-]?key)\s*[:=]\s*["'']?[A-Za-z0-9+/=]{86,88}["'']?'
  - id: DigitalOcean Token
    pattern: '\bdop_v1_[a-f0-9]{64}\b'
  - id: Supabase Service Key
    pattern: '(?i)(supabase[_-]?service[_-]?role[_-]?key|SUPABASE_SERVICE_ROLE_KEY)\s*[:=]\s*["'']?eyJ[A-Za-z0-9_=-]+\.[A-Za-z0-9_=-]+\.[A-Za-z0-9_=-]+["'']?'

  # ── Email services ──
  - id: SendGrid API Key
    pattern: '\bSG\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9_-]{43}\b'
  - id: Mailgun API Key
    pattern: '(?i)(mailgun[_-]?api[_-]?key|MAILGUN_API_KEY)\s*[:=]\s*["'']?key-[a-zA-Z0-9]{32}["'']?'

  # ── Monitoring ──
  - id: Datadog API Key
    pattern: '(?i)(datadog[_-]?api[_-]?key|DD_API_KEY)\s*[:=]\s*["'']?[a-f0-9]{32}["'']?'

  # ── Heroku ──
  # Requer contexto de atribuicao para evitar falsos positivos com UUIDs genericos
  - id: Heroku API Key
    pattern: '(?i)(heroku[_-]?api[_-]?key|HEROKU_API_KEY)\s*[:=]\s*["'']?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}["'']?'

  # ── Twilio ──
  - id: Twilio SID
    pattern: '\bAC[a-f0-9]{32}\b'
  - id: Twilio Auth Token
    pattern: '(?i)(twilio[_-]?auth[_-]?token|TWILIO_AUTH_TOKEN)\s*[:=]\s*["'']?[a-f0-9]{32}["'']?'

  # ── Package managers ──
  - id: NPM Auth Token
    pattern: '(?i)(npm[_-]?token|NPM_TOKEN|_authToken)\s*[:=]\s*["'']?npm_[a-zA-Z0-9]{36}["'']?'
  - id: PyPI Token
    pattern: '\bpypi-[A-Za-z0-9_-]{16,}\b'

  # ── Database connection strings ──
  - id: Database Connection String
    pattern: '(?i)(mongodb(\+srv)?|postgres(ql)?|mysql|mssql|redis|amqp|rabbitmq)://[^\s:]+:[^\s@]+@[^\s]+'

  # ── JWT (requer contexto de atribuicao para nao disparar em qualquer base64) ──
  - id: JSON Web Token (JWT)
    pattern: '(?i)(jwt|bearer|token|authorization)\s*[:=]\s*["'']?eyJ[a-zA-Z0-9_=-]+\.[a-zA-Z0-9_=-]+\.[a-zA-Z0-9_=-]+["'']?'

  # ── Credenciais em URLs (senha minimo 8 chars para filtrar ports) ──
  - id: Password in URL
    pattern: '[a-zA-Z][a-zA-Z0-9+.-]*://[^\s/:]+:[^\s/@]{8,}@[^\s]+'

  # ── Generic API Key (requer contexto de atribuicao: key = "valor") ──
  - id: Generic API Key
    pattern: '(?i)(api[_-]?key|api[_-]?secret|secret[_-]?key|access[_-]?token|auth[_-]?token|private[_-]?key|client[_-]?secret)\s*[:=]\s*["''][0-9a-zA-Z\-_/+=]{20,}["'']'

  # ── Execucao remota (pipe direto para shell) ──
  - id: Remote Script Execution
    pattern: '(curl|wget)\s+[^|;]+\|\s*(sudo\s+)?(bash|sh|zsh|python[23]?|perl|ruby|node)'

  # ── Comandos suspeitos (reverse shells, backdoors — so fora de safe context) ──
  - id: Suspicious Command
    pattern: '(mkfifo|/dev/tcp/|nc\s+-[elp]|ncat\s+(-e|--exec)|socat\s+exec|bash\s+-i\s+>&|python[23]?\s+-c\s+.*socket|perl\s+-e\s+.*socket|ruby\s+-rsocket|php\s+-r\s+.*fsockopen)'

  # ── PowerShell ofuscado ──
  - id: PowerShell Encoded
    pattern: '(?i)powershell[^\n]*-e(n|nc|nco|ncod|ncode|ncoded|ncodedC|ncodedCo|ncodedCom|ncodedComm|ncodedComma|ncodedComman|ncodedCommand)?\s+[a-zA-Z0-9+/=]{40,}'

  # ── Webhook URLs (exfiltracao de dados via webhooks) ──
  # Atacantes hardcodam webhooks para exfiltrar segredos, tokens e dados
  - id: Discord Webhook
    pattern: 'https://(discord(app)?\.com|canary\.discord\.com)/api/webhooks/[0-9]{17,20}/[A-Za-z0-9_-]{60,68}'
  - id: Slack Incoming Webhook
    pattern: 'https://hooks\.slack\.com/services/T[A-Z0-9]{8,12}/B[A-Z0-9]{8,12}/[a-zA-Z0-9]{24}'

  # ── Cloud Metadata SSRF ──
  # Acesso ao metadata service para roubar credenciais IAM/tokens temporarios
  # 169.254.169.254 (AWS/GCP/Azure), metadata.google.internal, metadata.azure.com
  - id: Cloud Metadata SSRF
    pattern: '(169\.254\.169\.254|metadata\.google\.internal|metadata\.azure\.com|100\.100\.100\.200)'

  # ── Crypto Mining ──
  # Mineradores escondidos no codigo: protocolos stratum, binarios conhecidos, pools
  - id: Crypto Mining
    pattern: '(?i)(stratum\+tcp://|stratum\+ssl://|\bxmrig\b|coinhive|cryptonight|moneroocean\.stream|minergate\.com|nanopool\.org|nicehash\.com|hashvault\.pro|supportxmr\.com)'

  # ── JNDI Injection (Log4Shell e variantes) ──
  # ${jndi:ldap://attacker.com/exploit} — CVE-2021-44228 e bypass variants
  - id: JNDI Injection
    pattern: '\$\{jndi:(ldap|rmi|dns|iiop|corba|nds|http)://'

  # ── Encoded Payload Execution ──
  # Base64/hex decodificado e executado: backdoor ofuscado classico
  - id: Encoded Payload Execution
    pattern: '(base64\s+(-d|--decode)\s*\|\s*(sudo\s+)?(bash|sh|zsh|python[23]?|perl|ruby|node)|exec\s*\(.*b64decode\s*\(|eval\s*\(\s*atob\s*\(|echo\s+[A-Za-z0-9+/=]{40,}\s*\|\s*base64\s+(-d|--decode))'

  # ── Docker Socket Mount (escape de container) ──
  # Montar docker.sock da acesso root ao host — escape trivial
  - id: Docker Socket Mount
    pattern: '(/var/run/docker\.sock|docker\.sock:/var/run/docker\.sock|-v\s+/var/run/docker\.sock)'

  # ── NPM Malicious Install Hook ──
  # Scripts de postinstall/preinstall que baixam e executam payloads
  - id: NPM Dangerous Hook
    pattern: '(?i)"(pre|post)install"\s*:\s*"[^"]*\b(curl|wget|nc|ncat|python|node\s+-e|bash\s+-c|sh\s+-c|powershell)'

  # ── SSH Key Injection (backdoor de acesso persistente) ──
  # Atacante injeta chave publica no authorized_keys para acesso permanente
  - id: SSH Key Injection
    pattern: '(>>?\s*~?/?(\.ssh/authorized_keys|\.ssh/authorized_keys2)|echo\s+.*ssh-(rsa|ed25519|ecdsa|dsa)\s+.*>>)'

  # ── Crontab Injection (persistencia via cron) ──
  # Adicionar entries no cron para manter backdoor ativo apos reboot
  - id: Crontab Injection
    pattern: '(echo\s+.*\|\s*crontab|crontab\s+-[^l].*\||\(crontab\s+-l|/etc/cron\.(d|daily|hourly|weekly|monthly)/[^\s]+)'

  # ── Sensitive System File Access ──
  # Leitura de arquivos criticos do sistema: /etc/shadow, sudoers, etc.
  - id: Sensitive File Access
    pattern: '(cat|head|tail|less|more|strings|xxd|curl\s+file://)\s+.*/etc/(shadow|master\.passwd|sudoers|gshadow)'

  # ── GCP Service Account Key (vazamento de credencial cloud) ──
  # Arquivos JSON com "type": "service_account" sao chaves GCP completas
  - id: GCP Service Account Key
    pattern: '"type"\s*:\s*"service_account"'

  # ── Tunnel Service URL (C2 via tunnel) ──
  # URLs de servicos de tunnel usados como C2 ou exfiltracao
  - id: Tunnel Service URL
    pattern: '(?i)(https?://[a-z0-9-]+\.(ngrok\.io|ngrok-free\.app|trycloudflare\.com|localtunnel\.me|loca\.lt|serveo\.net|localhost\.run))'

  # ── Unsafe Deserialization ──
  # Desserializacao insegura permite RCE: pickle, yaml.unsafe_load, PHP unserialize
  - id: Unsafe Deserialization
    pattern: '(pickle\.loads?\s*\(|yaml\.unsafe_load\s*\(|marshal\.loads?\s*\(|phpinfo\s*\(\s*\)|unserialize\s*\()'

  # ── Remote Code Loading (fetch + eval/exec) ──
  # Busca codigo de URL externa e executa: padrao classico de supply chain attack
  - id: Remote Code Loading
    pattern: '(?i)(fetch|axios|https?\.get|request|got)\s*\([^)]*\).*\.(then|catch|await)\s*.*\b(eval|Function|exec|execSync|child_process)\b|(eval|Function|new\s+Function)\s*\(\s*(await\s+)?(fetch|axios|https?\.get|response\.(text|data|body))\b'

  # ── Paste Service C2 (C2/exfiltration via paste services) ──
  # URLs de servicos de paste usados como C2, staging ou exfiltracao de dados
  - id: Paste Service C2
    pattern: '(?i)https?://[a-z0-9.-]*\b(npoint\.io|pastebin\.com|paste\.ee|hastebin\.com|dpaste\.org|ghostbin\.|rentry\.(co|org)|controlc\.com|justpaste\.it|paste\.mozilla\.org|termbin\.com|ix\.io|sprunge\.us|0x0\.st|transfer\.sh|file\.io)\b'

  # ── Whitespace invisivel (tecnicas de ofuscacao) ──
  - id: Invisible Whitespace
    pattern: "[\u200B\u200C\u200D\u2060\uFEFF]"
