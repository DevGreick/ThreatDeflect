# ============================================================================
# ThreatDeflect - Rules Configuration
# ============================================================================
# Este arquivo controla a precisao da analise de repositorios.
# Ajuste as regras e exclusoes para reduzir falsos positivos no seu contexto.
# ============================================================================

# --- PADROES IGNORADOS (nao analisados) ---
ignore_patterns:
  directories:
    # Package managers & vendored deps
    - /node_modules/
    - /bower_components/
    - /jspm_packages/
    - /web_modules/
    - /vendor/
    - /third_party/
    - /third-party/
    - /external/
    - /lib/site-packages/
    - /lib64/site-packages/
    - /site-packages/
    - /dist-packages/

    # Build output
    - /dist/
    - /build/
    - /out/
    - /target/
    - /bin/
    - /obj/
    - /release/
    - /debug/
    - /_build/

    # Python caches
    - /__pycache__/
    - /.pytest_cache/
    - /.mypy_cache/
    - /.ruff_cache/
    - /.tox/
    - /.eggs/
    - /.egg-info/

    # Coverage & test output
    - /htmlcov/
    - /.coverage/
    - /coverage/
    - /__snapshots__/

    # Documentation
    - /docs/
    - /doc/
    - /man/
    - /help/

    # Examples & demos (alto volume de falsos positivos)
    - /samples/
    - /examples/
    - /example/
    - /demo/
    - /demos/
    - /tutorials/
    - /fixtures/
    - /testdata/
    - /test_data/
    - /mock/
    - /mocks/
    - /stub/
    - /stubs/

    # VCS
    - /.git/
    - /.svn/
    - /.hg/
    - /.bzr/

    # Virtual environments
    - /.venv/
    - /venv/
    - /env/
    - /virtualenv/

    # IDE & editor
    - /.history/
    - /.settings/
    - /.project/
    - /.classpath/
    - /.idea/
    - /.vscode/

    # Temp & logs
    - /tmp/
    - /temp/
    - /log/
    - /logs/

    # Static assets (nunca contem segredos)
    - /assets/
    - /static/
    - /media/
    - /public/images/
    - /public/fonts/
    - /public/css/
    - /resources/images/
    - /res/drawable/
    - /res/mipmap/
    - /locales/
    - /i18n/
    - /translations/
    - /lang/

    # Framework caches & generated
