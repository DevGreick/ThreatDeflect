site_name: ThreatDeflect
site_description: Ferramenta de análise de ameaças com motor híbrido Python + Rust
site_author: DevGreick
site_url: https://devgreick.github.io/ThreatDeflect/
repo_name: DevGreick/ThreatDeflect
repo_url: https://github.com/DevGreick/ThreatDeflect
copyright: ""

theme:
  name: material
  language: pt-BR
  logo: https://raw.githubusercontent.com/DevGreick/ThreatDeflect/main/threatdeflect-logo.png
  favicon: https://raw.githubusercontent.com/DevGreick/ThreatDeflect/main/threatdeflect-logo.png
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: custom
      accent: green
      toggle:
        icon: material/brightness-4
        name: Modo claro
    - scheme: default
      primary: custom
      accent: green
      toggle:
        icon: material/brightness-7
        name: Modo escuro
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pt
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Instalacao: installation.md
  - Guia da GUI: gui-guide.md
  - Referencia CLI: cli-reference.md
  - Motor de Regras: rules-engine.md
  - Motor Rust: rust-engine.md
  - APIs: api-configuration.md
  - IA Local: ai-integration.md
  - Contribuicao: contributing.md
  - Changelog: changelog.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DevGreick
    - icon: fontawesome/solid/mug-hot
      link: https://buymeacoffee.com/devgreick
      name: Apoie o projeto
