name: Validate Author

on:
  push:
    branches: [main, dev]

jobs:
  validate-author:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Block unauthorized direct pushes
        run: |
          ALLOWED_EMAILS="github.distrust024@passinbox.com 39761156+DevGreick@users.noreply.github.com devgreick@users.noreply.github.com jacksongreick@protonmail.com 41898282+github-actions[bot]@users.noreply.github.com"

          AUTHOR_EMAIL=$(git log --format='%ae' -1)
          COMMITTER_EMAIL=$(git log --format='%ce' -1)
          AUTHOR_NAME=$(git log --format='%an' -1)

          AUTHOR_OK=0
          COMMITTER_OK=0

          for EMAIL in $ALLOWED_EMAILS; do
            if [ "$AUTHOR_EMAIL" = "$EMAIL" ]; then AUTHOR_OK=1; fi
            if [ "$COMMITTER_EMAIL" = "$EMAIL" ]; then COMMITTER_OK=1; fi
          done

          if [ $AUTHOR_OK -eq 0 ] || [ $COMMITTER_OK -eq 0 ]; then
            echo "::error::Unauthorized push by $AUTHOR_NAME <$AUTHOR_EMAIL>. Use a Pull Request instead."
            exit 1
          fi

          echo "Author validated: $AUTHOR_NAME <$AUTHOR_EMAIL>"
