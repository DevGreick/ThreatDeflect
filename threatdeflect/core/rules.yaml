    - /.terraform/
    - /.vagrant/
    - /android/app/build/
    - /ios/Pods/
    - /.gradle/
    - /.m2/

    # Migrations (SQL gerado, nao segredos)
    - /migrations/
    - /alembic/versions/

  files:
    # Lock files (gerados automaticamente)
    - package-lock.json
    - yarn.lock
    - pnpm-lock.yaml
    - Cargo.lock
    - Gemfile.lock
    - composer.lock
    - poetry.lock
    - Pipfile.lock
    - mix.lock
    - go.sum
