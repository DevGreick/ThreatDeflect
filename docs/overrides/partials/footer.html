<footer class="md-footer">
  <div class="md-footer-meta md-typeset">
    <div class="md-footer-meta__inner md-grid">
      <div class="md-copyright">
        ThreatDeflect &copy; 2026 <a href="https://github.com/DevGreick">DevGreick</a>
      </div>
      <div class="md-social">
        {% for social in config.extra.social %}
        <a href="{{ social.link }}" target="_blank" rel="noopener" title="{{ social.name | default('') }}" class="md-social__link">
          {% include ".icons/" ~ social.icon ~ ".svg" %}
        </a>
        {% endfor %}
      </div>
    </div>
  </div>
</footer>
