name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  RUST_TOOLCHAIN: 'stable'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: Linux
            gui_artifact: ThreatDeflect-GUI-Linux
            cli_artifact: ThreatDeflect-CLI-Linux
          - os: windows-latest
            platform: Windows
            gui_artifact: ThreatDeflect-GUI-Windows.exe
            cli_artifact: ThreatDeflect-CLI-Windows.exe
          - os: macos-14
            platform: macOS
            gui_artifact: ThreatDeflect-GUI-macOS
            cli_artifact: ThreatDeflect-CLI-macOS

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      # ── Checkout ──
      - uses: actions/checkout@v4

      # ── Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── Rust ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Compile Rust module ──
      - name: Build Rust engine (release)
        working-directory: rust_core
        run: cargo build --release

      # ── Create virtualenv and install dependencies ──
      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv

      - name: Activate venv and install (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller maturin
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Activate venv and install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller maturin
          echo "VIRTUAL_ENV=$env:VIRTUAL_ENV" >> $env:GITHUB_ENV
          echo "$env:VIRTUAL_ENV\Scripts" >> $env:GITHUB_PATH

      # ── Install Rust module into virtualenv ──
      - name: Install Rust module (maturin develop)
        run: maturin develop --release

      # ── Linux: install system deps for PySide6 ──
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1-mesa-glx libglib2.0-0 \
            libfontconfig1 libxkbcommon0 libdbus-1-3 \
            libxcb-xinerama0 libxcb-cursor0

      # ── Build GUI executable ──
      - name: Build GUI executable
        run: pyinstaller threatdeflect-gui.spec --noconfirm --clean

      # ── Build CLI executable ──
      - name: Build CLI executable
        run: pyinstaller threatdeflect-cli.spec --noconfirm --clean

      # ── Rename artifacts (Windows) ──
      - name: Rename artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item -Force dist/ThreatDeflect.exe "dist/${{ matrix.gui_artifact }}"
          Move-Item -Force dist/ThreatDeflect-CLI.exe "dist/${{ matrix.cli_artifact }}"

      # ── Rename artifacts (Linux) ──
      - name: Rename artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mv dist/ThreatDeflect "dist/${{ matrix.gui_artifact }}"
          mv dist/ThreatDeflect-CLI-Linux "dist/${{ matrix.cli_artifact }}"
          chmod +x "dist/${{ matrix.gui_artifact }}" "dist/${{ matrix.cli_artifact }}"

      # ── Rename artifacts (macOS) ──
      - name: Rename artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mv dist/ThreatDeflect "dist/${{ matrix.gui_artifact }}"
          mv dist/ThreatDeflect-CLI-macOS "dist/${{ matrix.cli_artifact }}"
          chmod +x "dist/${{ matrix.gui_artifact }}" "dist/${{ matrix.cli_artifact }}"

      # ── Upload artifacts ──
      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.gui_artifact }}
          path: dist/${{ matrix.gui_artifact }}
          retention-days: 5

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli_artifact }}
          path: dist/${{ matrix.cli_artifact }}
          retention-days: 5

  # ── Release ──
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release/
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
