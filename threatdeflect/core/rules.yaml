  sensitive_filenames:
    # Environment files (alta probabilidade de segredos)
    - .env
    - .env.local
    - .env.development
    - .env.production
    - .env.staging
    - .env.test
    - .envrc

    # Credentials & secrets (quase certeza de segredos)
    - credentials
    - credentials.json
    - credentials.yml
    - credentials.xml
    - secrets.json
    - secrets.yml
    - secrets.yaml
    - secret_key
    - master.key
    - encryption.key

    # Config com segredos frequentes
    - database.yml
    - database.json
    - wp-config.php
    - application.yml
    - application.properties
    - appsettings.json
    - appsettings.Development.json
    - appsettings.Production.json
